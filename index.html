<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Экосистема - Управление</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }
        .icon { font-size: 50px; margin-bottom: 15px; }
        .card h2 { margin: 10px 0; font-size: 22px; }
        .card p { font-size: 14px; opacity: 0.7; }
        
        .footer { margin-top: 50px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

    <h1>МОИ ПРОЕКТЫ</h1>

    <div class="grid">
        <a href="https://braianbaitano.github.io/geohealth/" class="card">
            <div class="icon">🏥</div>
            <h2>GeoHealth AI</h2>
            <p>Мониторинг здоровья и магнитных бурь</p>
        </a>

        <a href="https://braianbaitano.github.io/remember/" class="card">
            <div class="icon">💰</div>
            <h2>Склад напоминалка</h2>
            <p>Важные задачи не забыть</p>

        <a href="https://braianbaitano.github.io/ogorod_org/" class="card">
            <div class="icon">💰</div>
            <h2>Склад напоминалка</h2>
            <p>Менеджер огорода</p>
        </a>
    </div>

    <div class="footer">Powered by Gemini AI • 2026</div>

</body>
</html>
